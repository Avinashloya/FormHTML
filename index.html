<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
        body{
            background-color: rgb(74, 160, 184);
            color: rgb(245, 245, 245);

        }
    </style>
</head>
<body>
    <h1>Course  Registration Form</h1>
    <form action="">
        <table>

    <tr>
        <td><label for="fname">First Name</label></td>
        <td>
            <input 
                name="fname" 
                id="fname" 
                type="text" 
                placeholder="Enter your first name"
                required>
        </td>
    </tr>

    <tr>
        <td><label for="lname">Last Name</label></td>
        <td>
            <input 
                name="lname" 
                id="lname" 
                type="text" 
                placeholder="Enter your last name"
                required>
        </td>
    </tr>

    <tr>
        <td><label for="phone">Phone Number</label></td>
        <td>
            <input 
                name="phone" 
                id="phone" 
                type="tel" 
                placeholder="Enter your phone number"
                required>
        </td>
    </tr>

    <tr>
        <td><label for="email">Email</label></td>
        <td>
            <input 
                name="email" 
                id="email" 
                type="email" 
                placeholder="Enter your email"
                required>
        </td>
    </tr>

    <tr>
        <td><label for="password">Password</label></td>
        <td>
            <input 
                name="password" 
                id="password" 
                type="password" 
                placeholder="Enter password"
                required>
        </td>
    </tr>

    <tr>
        <td><label for="confirm_password">Confirm Password</label></td>
        <td>
            <input 
                name="confirm_password" 
                id="confirm_password"  
                type="password" 
                placeholder="Re-enter password"
                required>
        </td>
    </tr>

    <tr>
        <td><label for="dob">Date of Birth</label></td>
        <td>
            <input 
                name="dob" 
                id="dob" 
                type="date" 
                required>
        </td>
    </tr>

    <tr>
        <td><label for="age">Age</label></td>
        <td>
            <input 
                name="age" 
                id="age" 
                type="number" 
                placeholder="Enter your age"
                required>
        </td>
    </tr>

    <tr>
        <td><label for="gender">Gender</label></td>
        <td>
            <input type="radio" name="gender" id="male" value="male" required>
            <label for="male">Male</label>

            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>

            <input type="radio" name="gender" id="other" value="other">
            <label for="other">Other</label>
        </td>
    </tr>

    <tr>
        <td><label for="course">Course</label></td>
        <td>
            <select name="course" id="course" required>
                <option value="">Select Course</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="javascript">JavaScript</option>
            </select>
        </td>
    </tr>

    <tr>
        <td><label for="resume">Upload PDF</label></td>
        <td>
            <input 
                name="resume" 
                id="resume"  
                type="file" 
                accept=".pdf" 
                required>
        </td>
    </tr>

    <tr>
        <td colspan="2" align="center">
            <button type="submit">Submit Form</button>
        </td>
    </tr>

</table>
    
</form>
     
<form action="">
    <h2>Course Details</h2>
    <table>
        <tr>
            <td><label for="course">Select Course</label></td>
            <td>
                <select name="course" id="course">
                    <option value="">Select</option>
                    <option value="python">Python Full Stack Using AI</option>
                    <option value="java">Java Full Stack Using AI</option>
                    <option value="Data Science Using AI">Data Science Using AI </option>
                 </select>
            </td>
         </tr>
         <tr>
            <td><label for="Mode">Mode of class</label></td>
            <td>
                <input type="radio" name="Mode" id="online" value="Online"> Online
                 <input type="radio" name="Mode" id="offline" value="Offline">Offline
            </td>
            
         </tr>
         <tr>
            <td><label for="add">Address</label></td>
            <td><div><input type="text" name="add" id="add" placeholder="Enter your address"></div></td>
         </tr>
    </table>
    
</form>
</body>
</html>
